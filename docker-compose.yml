# Run the whole stack locally in containers: docker compose up --build
# Then open http://localhost:8080
services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000

  web:
    build:
      context: ./frontend
      args:
        # The browser calls the API, so this points at the API's published host port.
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    depends_on:
      - api

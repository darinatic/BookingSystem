services:
  # FastAPI backend (Docker web service)
  - name: godoc-booking-api
    type: web
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health

  # Vue SPA (Docker web service, nginx)
  - name: godoc-booking-web
    type: web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      # Render passes this to the Docker build as a build arg; Vite bakes it in.
      # Must match the API's public URL above.
      - key: VITE_API_BASE_URL
        value: https://godoc-booking-api.onrender.com
